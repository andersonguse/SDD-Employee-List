openapi: 3.0.3
info:
  title: Employee CRUD API
  version: 1.0.0
  description: REST contract for managing employee records from the web page.
servers:
  - url: http://localhost:8080
paths:
  /api/employees:
    get:
      summary: List employees
      operationId: listEmployees
      responses:
        "200":
          description: Current employees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Employee"
    post:
      summary: Create employee
      operationId: createEmployee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeInput"
      responses:
        "201":
          description: Employee created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
        "400":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "409":
          description: Email address already belongs to another employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
  /api/employees/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
    get:
      summary: Get employee
      operationId: getEmployee
      responses:
        "200":
          description: Employee found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
        "404":
          description: Employee not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    put:
      summary: Update employee
      operationId: updateEmployee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeInput"
      responses:
        "200":
          description: Employee updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
        "400":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "404":
          description: Employee not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Email address already belongs to another employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
    delete:
      summary: Delete employee
      operationId: deleteEmployee
      responses:
        "204":
          description: Employee deleted
        "404":
          description: Employee not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  schemas:
    Employee:
      type: object
      required:
        - id
        - name
        - email
        - phoneNumber
      properties:
        id:
          type: integer
          format: int64
          minimum: 1
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        phoneNumber:
          type: string
          minLength: 12
          maxLength: 12
          pattern: "^\\d{3}-\\d{3}-\\d{4}$"
          example: "123-456-7890"
    EmployeeInput:
      type: object
      required:
        - name
        - email
        - phoneNumber
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        phoneNumber:
          type: string
          minLength: 12
          maxLength: 12
          pattern: "^\\d{3}-\\d{3}-\\d{4}$"
          example: "123-456-7890"
    ValidationError:
      type: object
      required:
        - message
        - fieldErrors
      properties:
        message:
          type: string
        fieldErrors:
          type: object
          additionalProperties:
            type: string
    ApiError:
      type: object
      required:
        - message
      properties:
        message:
          type: string
