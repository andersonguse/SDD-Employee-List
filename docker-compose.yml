services:
  postgres:
    image: postgres:16-alpine
    container_name: sdd-employee-list-postgres
    environment:
      POSTGRES_DB: sdd_employee_list
      POSTGRES_USER: sdd_user
      POSTGRES_PASSWORD: sdd_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdd_user -d sdd_employee_list"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
